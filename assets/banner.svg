<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#headerGrad)"/>
  
  <!-- Subtle Grid -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="140" text-anchor="middle" fill="#fff" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">OPPORTUNITY AGGREGATOR</text>
  
  <!-- Subtitle -->
  <text x="600" y="190" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="400">AI-Powered Intelligence for Career &amp; Growth</text>
  
  <!-- Accent Line -->
  <rect x="400" y="210" width="400" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Features Icons Row -->
  <g font-family="Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol" font-size="30" opacity="0.8">
    <text x="450" y="260" text-anchor="middle">📡</text>
    <text x="550" y="260" text-anchor="middle">🧠</text>
    <text x="650" y="260" text-anchor="middle">🔔</text>
    <text x="750" y="260" text-anchor="middle">🚢</text>
  </g>
</svg>
